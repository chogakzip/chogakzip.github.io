<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>chogakzip</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #EDEAE4;
    --ink: #1A1816;
    --mid: #9A9590;
    --line: #D8D4CE;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .site {
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: 44px 1fr 44px;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    border-bottom: 1px solid var(--line);
  }
  .nav-right { display: flex; gap: 32px; color: var(--mid); }
  .nav-right a { color: var(--mid); text-decoration: none; transition: color 0.15s; }
  .nav-right a:hover, .nav-right a.active { color: var(--ink); }

  /* MAIN */
  main { display: grid; grid-template-columns: 200px 1fr; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--line);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .collection-btn {
    background: none; border: none;
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    text-align: left; color: var(--mid);
    padding: 10px 0;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    display: flex; justify-content: space-between; align-items: center;
    transition: color 0.15s;
    width: 100%;
  }
  .collection-btn:hover { color: var(--ink); }
  .collection-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
  .collection-btn .cnum { font-size: 9px; color: inherit; opacity: 0.6; }

  .sidebar-meta { color: var(--mid); line-height: 2.2; font-size: 9px; }

  /* GALLERY */
  .gallery-wrap { position: relative; overflow: hidden; }

  .collection-info {
    position: absolute; top: 28px; left: 28px;
    z-index: 10; pointer-events: none;
  }
  .cnum-big { font-size: 9px; color: var(--mid); display: block; margin-bottom: 8px; }
  .ctitle { font-size: 11px; color: var(--ink); line-height: 1.8; }

  .scroll-hint {
    position: absolute; bottom: 28px; right: 28px;
    color: var(--mid); font-size: 9px; z-index: 10;
    pointer-events: none; transition: opacity 0.4s;
  }

  .gallery-track {
    display: flex; align-items: center; gap: 10px;
    height: 100%; padding: 0 28px;
    overflow-x: auto; overflow-y: hidden;
    scroll-behavior: smooth;
    -ms-overflow-style: none; scrollbar-width: none;
    cursor: grab; transition: opacity 0.2s;
  }
  .gallery-track::-webkit-scrollbar { display: none; }
  .gallery-track.dragging { cursor: grabbing; scroll-behavior: auto; }

  .photo-card {
    flex-shrink: 0;
    background: var(--line);
    position: relative; overflow: hidden;
    transition: transform 0.3s ease;
  }
  .photo-card:hover { transform: translateY(-3px); }

  .photo-card img { display: block; width: 100%; height: 100%; object-fit: cover; }

  .photo-card .label {
    position: absolute; bottom: 9px; left: 9px;
    font-size: 8px; color: rgba(255,255,255,0.45);
    letter-spacing: 0.12em; pointer-events: none;
  }

  /* shimmer for placeholders */
  .photo-card::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
    animation: shimmer 2.2s infinite;
  }
  .photo-card.has-image::after { display: none; }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* sizes */
  .sm   { width: 150px; height: 195px; }
  .md   { width: 210px; height: 290px; }
  .lg   { width: 290px; height: 390px; }
  .xl   { width: 340px; height: 440px; }
  .sq   { width: 230px; height: 230px; }
  .wide { width: 340px; height: 225px; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; color: var(--mid); font-size: 9px;
  }
  footer a { color: var(--mid); text-decoration: none; transition: color 0.15s; }
  footer a:hover { color: var(--ink); }

  /* MOBILE */
  @media (max-width: 640px) {
    html, body { overflow: auto; }
    .site { height: auto; grid-template-rows: 44px auto 44px; }
    main { grid-template-columns: 1fr; }
    .sidebar {
      border-right: none; border-bottom: 1px solid var(--line);
      flex-direction: row; flex-wrap: wrap; gap: 0; padding: 12px 20px;
    }
    .sidebar-meta { display: none; }
    .collection-btn { width: auto; padding: 8px 12px 8px 0; border-bottom: none; }
    .gallery-wrap { height: 65vw; min-height: 260px; }
    .sm { width: 110px; height: 145px; }
    .md { width: 160px; height: 220px; }
    .lg { width: 210px; height: 280px; }
    .xl { width: 240px; height: 310px; }
    .sq { width: 170px; height: 170px; }
    .wide { width: 240px; height: 160px; }
    .collection-info { top: 14px; left: 16px; }
    .scroll-hint { display: none; }
  }
</style>
</head>
<body>
<div class="site">

  <nav>
    <span>Chogakzip</span>
    <div class="nav-right">
      <a href="#" class="active">Archive</a>
      <a href="https://instagram.com/chogakzip" target="_blank">Instagram</a>
    </div>
  </nav>

  <main>
    <div class="sidebar">
      <div>
        <button class="collection-btn active" onclick="show('london')" data-id="london">
          London <span class="cnum">(01)</span>
        </button>
        <button class="collection-btn" onclick="show('japan')" data-id="japan">
          Japan <span class="cnum">(02)</span>
        </button>
        <button class="collection-btn" onclick="show('daily')" data-id="daily">
          Daily <span class="cnum">(03)</span>
        </button>
        <button class="collection-btn" onclick="show('paris')" data-id="paris">
          Paris <span class="cnum">(04)</span>
        </button>
        <button class="collection-btn" onclick="show('newzealand')" data-id="newzealand">
          New Zealand <span class="cnum">(05)</span>
        </button>
      </div>
      <div class="sidebar-meta">
        35mm Film<br>
        2023–2026<br><br>
        Kodak / Fuji<br>
        Mixed Rolls
      </div>
    </div>

    <div class="gallery-wrap">
      <div class="collection-info">
        <span class="cnum-big" id="infoNum">(01)</span>
        <div class="ctitle" id="infoTitle">London<br>2024</div>
      </div>
      <div class="scroll-hint" id="scrollHint">Drag to explore →</div>
      <div class="gallery-track" id="track"></div>
    </div>
  </main>

  <footer>
    <span id="footerText">London — — frames</span>
    <a href="mailto:hello@chogakzip.com">Contact</a>
  </footer>

</div>
<script>
  const data = {
    london: {
      num:'(01)', title:'London<br>2024', film:'Kodak Portra 400',
      frames:[
        {s:'lg',l:'LDN 001'},{s:'sm',l:'LDN 002'},{s:'md',l:'LDN 003'},
        {s:'xl',l:'LDN 004'},{s:'sm',l:'LDN 005'},{s:'wide',l:'LDN 006'},
        {s:'md',l:'LDN 007'},{s:'sq',l:'LDN 008'},
      ]
    },
    japan: {
      num:'(02)', title:'Japan<br>2024', film:'Fuji 400H',
      frames:[
        {s:'md',l:'JPN 001'},{s:'xl',l:'JPN 002'},{s:'sm',l:'JPN 003'},
        {s:'lg',l:'JPN 004'},{s:'sq',l:'JPN 005'},{s:'md',l:'JPN 006'},
        {s:'sm',l:'JPN 007'},{s:'wide',l:'JPN 008'},{s:'lg',l:'JPN 009'},
      ]
    },
    daily: {
      num:'(03)', title:'Daily<br>2023–2024', film:'Mixed',
      frames:[
        {s:'sq',l:'DAY 001'},{s:'md',l:'DAY 002'},{s:'sm',l:'DAY 003'},
        {s:'lg',l:'DAY 004'},{s:'wide',l:'DAY 005'},{s:'sm',l:'DAY 006'},
        {s:'xl',l:'DAY 007'},{s:'md',l:'DAY 008'},{s:'sq',l:'DAY 009'},{s:'sm',l:'DAY 010'},
      ]
    },
    paris: {
      num:'(04)', title:'Paris<br>2023', film:'Kodak Gold 200',
      frames:[
        {s:'xl',l:'PAR 001'},{s:'sm',l:'PAR 002'},{s:'md',l:'PAR 003'},
        {s:'lg',l:'PAR 004'},{s:'sq',l:'PAR 005'},{s:'wide',l:'PAR 006'},
      ]
    },
    newzealand: {
      num:'(05)', title:'New Zealand<br>2026', film:'Kodak Portra 400',
      frames: Array.from({length: 38}, (_, i) => {
        const sizes = ['lg','sm','md','xl','wide','sq','sm','lg','md'];
        const num = String(i+1).padStart(4,'0');
        return {
          s: sizes[i % sizes.length],
          l: 'NZ ' + String(i+1).padStart(3,'0'),
          img: 'images/newzealand/00037375' + num + '.jpeg'
        };
      })
    }
  };

  function show(id) {
    const col = data[id];
    const track = document.getElementById('track');

    document.querySelectorAll('.collection-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.id === id));

    document.getElementById('infoNum').textContent = col.num;
    document.getElementById('infoTitle').innerHTML = col.title;
    document.getElementById('footerText').textContent =
      col.title.replace('<br>',' ').replace(/\d{4}.*/, '').trim() +
      ' \u2014 ' + col.frames.length + ' frames';

    track.style.opacity = '0';
    setTimeout(() => {
      track.innerHTML = '';
      track.scrollLeft = 0;
      col.frames.forEach(f => {
        const d = document.createElement('div');
        d.className = `photo-card ${f.s}`;
        if (f.img) {
          d.classList.add('has-image');
          d.style.backgroundImage = `url('${f.img}')`;
          d.style.backgroundSize = 'cover';
          d.style.backgroundPosition = 'center';
        }
        d.innerHTML = `<span class="label">${f.l}</span>`;
        track.appendChild(d);
      });
      track.style.opacity = '1';
      document.getElementById('scrollHint').style.opacity = '1';
    }, 180);
  }

  // drag scroll
  const track = document.getElementById('track');
  let down = false, sx, sl;
  track.addEventListener('mousedown', e => { down=true; sx=e.pageX-track.offsetLeft; sl=track.scrollLeft; track.classList.add('dragging'); });
  window.addEventListener('mouseup', () => { down=false; track.classList.remove('dragging'); });
  track.addEventListener('mousemove', e => {
    if(!down) return; e.preventDefault();
    track.scrollLeft = sl - (e.pageX - track.offsetLeft - sx) * 1.1;
  });
  track.addEventListener('scroll', () => {
    document.getElementById('scrollHint').style.opacity = '0';
  }, {once:true});

  show('london');
</script>
</body>
</html>
