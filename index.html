<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>chogakzip</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #EDEAE4;
    --ink: #1A1816;
    --mid: #8A8480;
    --line: #D5D0CA;
  }

  html, body { width: 100%; min-height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }
  a:hover { color: var(--mid); }

  /* page show/hide */
  .page { display: none; min-height: 100vh; }
  .page.active { display: flex; flex-direction: column; }

  /* ───────── TOP BAR ───────── */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 32px;
    text-transform: uppercase;
    font-size: 10px; letter-spacing: 0.12em;
  }

  /* ═══════════ LANDING ═══════════ */
  #landing { }

  .landing-main {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 80px 32px 60px;
    text-align: center;
  }

  .wordmark {
    font-size: clamp(56px, 9vw, 112px);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 32px;
  }

  .tagline {
    color: var(--mid);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    max-width: 480px;
  }

  .index-section {
    border-top: 1px solid var(--line);
    padding: 24px 32px 32px;
  }

  .project-row {
    display: grid;
    grid-template-columns: 110px 1fr 1fr 24px;
    gap: 24px;
    padding: 18px 0;
    border-bottom: 1px solid var(--line);
    text-transform: uppercase;
    font-size: 10px; letter-spacing: 0.14em;
    align-items: center;
    transition: padding-left 0.25s ease, color 0.2s ease;
  }
  .project-row:last-of-type { border-bottom: none; }
  .project-row:hover {
    padding-left: 12px;
    color: var(--mid);
  }
  .project-row .city {
    color: var(--ink);
    font-size: 12px;
    letter-spacing: 0.18em;
  }
  .project-row:hover .city { color: var(--mid); }
  .project-row .arrow { text-align: right; color: var(--mid); }

  .footer-meta {
    display: flex; justify-content: space-between;
    margin-top: 24px;
    color: var(--mid);
    font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ═══════════ PROJECT PAGE ═══════════ */
  #project { }

  .project-main {
    flex: 1;
    position: relative;
    padding: 16px 0 8px;
  }

  /* masonry grid — preserves natural aspect ratios */
  .gallery-grid {
    columns: 3;
    column-gap: 14px;
    padding: 16px 32px 32px;
  }

  .photo-card {
    break-inside: avoid;
    margin-bottom: 14px;
    background: var(--line);
    position: relative;
    overflow: hidden;
    transition: transform 0.25s ease, opacity 0.3s ease;
    opacity: 0;
  }
  .photo-card.loaded { opacity: 1; }
  .photo-card:hover { transform: translateY(-3px); }
  .photo-card img {
    display: block;
    width: 100%;
    height: auto;
  }

  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--mid);
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .project-info {
    text-align: center;
    padding: 28px 32px 20px;
    color: var(--mid);
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase;
    line-height: 2;
  }
  .project-info .city {
    color: var(--ink);
    font-size: 13px;
    letter-spacing: 0.22em;
    margin-bottom: 4px;
  }

  .nav-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 24px;
    padding: 24px 32px 28px;
    border-top: 1px solid var(--line);
    text-transform: uppercase;
    font-size: 10px; letter-spacing: 0.14em;
  }
  .nav-row .center { text-align: center; color: var(--mid); }
  .nav-row .right  { text-align: right; }

  /* ───────── MOBILE ───────── */
  @media (max-width: 640px) {
    .top-bar { padding: 16px 20px; }
    .landing-main { padding: 56px 20px 40px; }
    .wordmark { font-size: 56px; margin-bottom: 24px; }
    .tagline { font-size: 9px; }
    .index-section { padding: 16px 20px 24px; }
    .project-row {
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 14px 0;
    }
    .project-row .num { display: none; }
    .project-row .meta { display: none; }
    .project-row .arrow { display: none; }
    .project-row .city { font-size: 11px; }
    .project-row:hover { padding-left: 0; }
    .gallery-grid { columns: 2; column-gap: 10px; padding: 12px 20px 24px; }
    .photo-card { margin-bottom: 10px; }
    .nav-row { padding: 20px; gap: 12px; }
  }
  @media (max-width: 420px) {
    .gallery-grid { columns: 1; }
  }
</style>
</head>
<body>

<!-- ════════════ LANDING PAGE ════════════ -->
<div class="page" id="landing">
  <header class="top-bar">
    <span>Chogakzip</span>
    <span>(Profile)</span>
  </header>

  <main class="landing-main">
    <h1 class="wordmark">chogakzip</h1>
    <p class="tagline">Film archive — 35mm photographs from 2023 to 2026</p>
  </main>

  <footer class="index-section">
    <div id="projectIndex"></div>
    <div class="footer-meta">
      <span>© 2026 chogakzip</span>
      <a href="https://instagram.com/chogakzip" target="_blank">Instagram ↗</a>
    </div>
  </footer>
</div>

<!-- ════════════ PROJECT PAGE ════════════ -->
<div class="page" id="project">
  <header class="top-bar">
    <a href="#">Chogakzip</a>
    <span id="projNumber">Project 001</span>
  </header>

  <main class="project-main">
    <div class="gallery-grid" id="grid"></div>
  </main>

  <section class="project-info">
    <div class="city" id="projCity">London</div>
    <div id="projMeta">2024 · Kodak Portra 400 · 8 frames</div>
  </section>

  <footer class="nav-row">
    <a id="prevLink"></a>
    <a href="#" class="center">Index ↑</a>
    <a id="nextLink" class="right"></a>
  </footer>
</div>

<script>
  /* ─────────── DATA ───────────
     To add a new project later:
       1. Create folder: images/<id>/
       2. Add a photo file list in `photos`
       3. Add an entry below
  */
  const projects = [
    {
      id: 'london', num: '001', city: 'LONDON',
      year: '2024', film: 'Kodak Portra 400',
      photos: []   // add photos to images/london/ then list filenames
    },
    {
      id: 'tokyo', num: '002', city: 'TOKYO',
      year: '2024', film: 'Fuji 400H',
      photos: []
    },
    {
      id: 'seoul', num: '003', city: 'SEOUL',
      year: '2023–2024', film: 'Mixed Rolls',
      photos: []
    },
    {
      id: 'paris', num: '004', city: 'PARIS',
      year: '2023', film: 'Kodak Gold 200',
      photos: []
    },
    {
      id: 'wanaka', num: '005', city: 'WANAKA',
      year: '2026', film: 'Kodak Portra 400',
      photos: Array.from({length: 38}, (_, i) =>
        'images/wanaka/00037375' + String(i+1).padStart(4, '0') + '.jpeg'
      )
    }
  ];

  /* ─────────── RENDER LANDING ─────────── */
  const indexEl = document.getElementById('projectIndex');
  projects.forEach(p => {
    const a = document.createElement('a');
    a.href = '#' + p.id;
    a.className = 'project-row';
    a.innerHTML =
      '<span class="num">Project ' + p.num + '</span>' +
      '<span class="city">' + p.city + '</span>' +
      '<span class="meta">' + p.year + ' · ' + p.film + '</span>' +
      '<span class="arrow">→</span>';
    indexEl.appendChild(a);
  });

  /* ─────────── RENDER PROJECT ─────────── */
  function renderProject(project) {
    document.getElementById('projNumber').textContent = 'Project ' + project.num;
    document.getElementById('projCity').textContent = project.city;

    const count = project.photos.length;
    const frameLabel = count > 0
      ? count + ' frames'
      : 'coming soon';
    document.getElementById('projMeta').textContent =
      project.year + ' · ' + project.film + ' · ' + frameLabel;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (count === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'No frames yet — coming soon';
      grid.appendChild(empty);
    } else {
      project.photos.forEach((src, i) => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        const img = document.createElement('img');
        img.src = src;
        img.alt = project.city + ' ' + String(i+1).padStart(3, '0');
        img.loading = 'lazy';
        img.addEventListener('load', () => card.classList.add('loaded'));
        img.addEventListener('error', () => card.classList.add('loaded'));
        card.appendChild(img);
        grid.appendChild(card);
      });
    }

    // prev / next
    const idx = projects.findIndex(p => p.id === project.id);
    const prev = projects[idx - 1];
    const next = projects[idx + 1];

    const prevLink = document.getElementById('prevLink');
    const nextLink = document.getElementById('nextLink');

    if (prev) {
      prevLink.href = '#' + prev.id;
      prevLink.textContent = '← ' + prev.city;
      prevLink.style.visibility = 'visible';
    } else {
      prevLink.style.visibility = 'hidden';
    }
    if (next) {
      nextLink.href = '#' + next.id;
      nextLink.textContent = next.city + ' →';
      nextLink.style.visibility = 'visible';
    } else {
      nextLink.style.visibility = 'hidden';
    }
  }

  /* ─────────── ROUTING ─────────── */
  function renderRoute() {
    const hash = (window.location.hash || '').slice(1);
    const project = projects.find(p => p.id === hash);

    if (project) {
      document.getElementById('landing').classList.remove('active');
      document.getElementById('project').classList.add('active');
      renderProject(project);
    } else {
      document.getElementById('landing').classList.add('active');
      document.getElementById('project').classList.remove('active');
    }
    window.scrollTo(0, 0);
  }

  window.addEventListener('hashchange', renderRoute);
  renderRoute();
</script>

</body>
</html>
